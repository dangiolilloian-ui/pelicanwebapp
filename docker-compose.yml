services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pelican
      POSTGRES_USER: pelican
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pelican_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelican"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://pelican:${DB_PASSWORD:-pelican_secret}@db:5432/pelican
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      PORT: 4000
    ports:
      - "4002:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # Nightly pg_dump sidecar.  Uses the same Alpine Postgres image as the
  # primary DB so we always have a compatible pg_dump binary, and writes
  # gzipped dumps to a named volume + a host bind for off-box copies.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: pelican
      PGDATABASE: pelican
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pelican_secret}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-14}
    volumes:
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backup/data:/backups
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
